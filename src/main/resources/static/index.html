<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skillset Search Portal</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #222; }
        h1 { font-size: 22px; }
        h2 { font-size: 18px; margin-top: 40px; }
        input { display: block; width: 100%; padding: 8px; margin: 6px 0 14px; box-sizing: border-box; }
        button { padding: 8px 16px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 14px; }
        th { background: #f2f2f2; }
        .msg { margin-top: 10px; font-size: 14px; }
        .error { color: #b00020; }
        .success { color: #2e7d32; }
    </style>
</head>
<body>

<h1>Skillset Search Portal</h1>

<h2>Add Skill</h2>
<input type="number" id="employeeId" placeholder="Employee ID (e.g. 1)">
<input type="text" id="skillName" placeholder="Skill Name (e.g. Java)">
<input type="text" id="proficiencyName" placeholder="Proficiency (e.g. Expert)">
<input type="number" step="0.1" id="yearsWorked" placeholder="Years Worked (e.g. 2.5)">
<button onclick="addSkill()">Add Skill</button>
<div id="addMsg" class="msg"></div>

<h2>Search by Skill</h2>
<input type="text" id="searchSkill" placeholder="Skill Name (e.g. Java)">
<button onclick="searchSkill()">Search</button>
<div id="searchMsg" class="msg"></div>
<table id="resultsTable" style="display:none;">
    <thead>
    <tr><th>Employee</th><th>Skill</th><th>Proficiency</th><th>Years Worked</th></tr>
    </thead>
    <tbody id="resultsBody"></tbody>
</table>

<script>
    const BASE_URL = "http://localhost:8080/api/skills";
    const AUTH_HEADER = "Basic " + btoa("admin:admin123");

    async function addSkill() {
        const employeeId = document.getElementById("employeeId").value;
        const skillName = document.getElementById("skillName").value;
        const proficiencyName = document.getElementById("proficiencyName").value;
        const yearsWorked = document.getElementById("yearsWorked").value;
        const msgDiv = document.getElementById("addMsg");
        msgDiv.textContent = "";
        msgDiv.className = "msg";

        try {
            const response = await fetch(BASE_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": AUTH_HEADER
                },
                body: JSON.stringify({
                    employeeId: Number(employeeId),
                    skillName,
                    proficiencyName,
                    yearsWorked: Number(yearsWorked)
                })
            });

            const data = await response.json();

            if (!response.ok) {
                const firstError = Object.values(data)[0] || "Something went wrong";
                msgDiv.textContent = firstError;
                msgDiv.classList.add("error");
                return;
            }

            msgDiv.textContent = `Added: ${data.employeeName} — ${data.skillName} (${data.proficiencyName})`;
            msgDiv.classList.add("success");
        } catch (err) {
            msgDiv.textContent = "Could not reach the server. Is it running on port 8080?";
            msgDiv.classList.add("error");
        }
    }

    async function searchSkill() {
        const skillName = document.getElementById("searchSkill").value;
        const msgDiv = document.getElementById("searchMsg");
        const table = document.getElementById("resultsTable");
        const tbody = document.getElementById("resultsBody");
        msgDiv.textContent = "";
        msgDiv.className = "msg";
        tbody.innerHTML = "";
        table.style.display = "none";

        try {
            const response = await fetch(`${BASE_URL}/search?skillName=${encodeURIComponent(skillName)}`);
            const data = await response.json();

            if (!response.ok) {
                msgDiv.textContent = "Search failed.";
                msgDiv.classList.add("error");
                return;
            }

            if (data.length === 0) {
                msgDiv.textContent = "No employees found with that skill.";
                return;
            }

            data.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${row.employeeName}</td><td>${row.skillName}</td><td>${row.proficiencyName}</td><td>${row.yearsWorked}</td>`;
                tbody.appendChild(tr);
            });
            table.style.display = "table";
        } catch (err) {
            msgDiv.textContent = "Could not reach the server. Is it running on port 8080?";
            msgDiv.classList.add("error");
        }
    }
</script>

</body>
</html>
